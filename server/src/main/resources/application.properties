spring.application.name=server

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/todolist}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:<your-postgres-username>}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:<your-postgres-password>}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
